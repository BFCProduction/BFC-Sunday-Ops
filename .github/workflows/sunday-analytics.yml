name: Sunday Analytics Pull
on:
  schedule:
    - cron: '30 20 * * 0'
  workflow_dispatch:

jobs:
  pull-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - name: Pull YouTube Analytics
        run: node scripts/fetch-youtube.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_HANDLE: '@BethanyNaz'
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Pull RESI Analytics
        run: node scripts/fetch-resi.js
        env:
          RESI_EMAIL: ${{ secrets.RESI_EMAIL }}
          RESI_PASSWORD: ${{ secrets.RESI_PASSWORD }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
